<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>IGCSE Pastel Pro 2025</title>
    <link href='https://fonts.googleapis.com' rel='stylesheet'>
    <style>
        :root { 
            --bg: #fdfdfd; --card: #ffffff; --text: #333; --border: #e9ecef;
            --math: #d1ecf1; --phys: #fff3cd; --chem: #d4edda; --bio: #f8d7da;
            --current: #f8f9fa;
        }
        body.dark-mode { 
            --bg: #121212; --card: #1e1e1e; --text: #f8f9fa; --border: #333;
            --math: #0c5460; --phys: #856404; --chem: #155724; --bio: #721c24;
            --current: #121212;
        }
        body { 
            font-family: 'Quicksand', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; min-height: 100vh; transition: 0.4s; display: flex; flex-direction: column;
        }
        header { 
            padding: 20px 40px; background: var(--card); border-bottom: 4px solid var(--current);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .mode-toggle { background: var(--bg); border: 2px solid var(--border); padding: 10px 15px; border-radius: 50px; cursor: pointer; font-size: 1.2rem; transition: 0.3s; color: var(--text); }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; width: 100%; box-sizing: border-box; flex: 1; }
        .search-area { text-align: center; margin-bottom: 40px; }
        #mainSearch { width: 100%; max-width: 600px; padding: 20px; border: 3px solid var(--border); border-radius: 50px; background: var(--card); color: var(--text); font-family: 'Quicksand'; font-weight: 700; font-size: 1rem; outline: none; }

        /* Bolder Grid */
        #dashboard { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 30px; }
        .sub-card { 
            background: var(--card); border: 5px solid var(--border); border-radius: 25px; 
            padding: 40px 20px; text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 12px 0 var(--border);
        }
        .sub-card:hover { transform: translateY(-5px); border-color: #aaa; }
        .sub-card.selected { border-color: #28a745; box-shadow: 0 12px 0 #28a745; }
        .sub-card h3 { font-weight: 700; margin: 10px 0; font-size: 1.4rem; }

        /* Tracker View UI */
        #trackerView { display: none; }
        .tab-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 25px; }
        .tab-item { padding: 12px 25px; background: var(--card); border: 2px solid var(--border); border-radius: 50px; cursor: pointer; font-weight: 700; white-space: nowrap; }
        .tab-item.active { background: var(--current); border-color: var(--text); }

        .card { background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 15px; background: rgba(0,0,0,0.03); border-radius: 15px; text-align: center; font-weight: 700; }
        
        .mark-box { 
            background: var(--card); border: 2px solid var(--border); color: var(--text); 
            width: 60px; text-align: center; padding: 8px; border-radius: 12px; font-weight: 800; font-family: 'Inter'; outline: none;
        }

        .nav-btn { position: fixed; bottom: 30px; right: 30px; background: #333; color: #fff; padding: 22px 45px; border-radius: 60px; font-weight: 700; cursor: pointer; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.3); z-index: 1001; }
        .back-btn { position: fixed; bottom: 30px; left: 30px; background: #eee; color: #333; padding: 15px 30px; border-radius: 50px; cursor: pointer; border: 1px solid #ddd; font-weight: 700; z-index: 1001; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }
        #drawer { position: fixed; right: -450px; top: 0; width: 400px; height: 100%; background: var(--card); border-left: 10px solid var(--current); padding: 40px; transition: 0.4s; z-index: 2000; overflow-y: auto; box-sizing: border-box; }
        #drawer.open { right: 0; }
        textarea { width: 100%; height: 200px; background: var(--bg); border: 2px solid var(--border); color: var(--text); padding: 15px; border-radius: 15px; font-family: inherit; }
        .save-btn { width: 100%; padding: 18px; background: #333; color: #fff; font-weight: 700; border: none; border-radius: 15px; cursor: pointer; margin-top: 20px; }
        footer { padding: 40px; text-align: center; opacity: 0.5; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div style="width: 80px;"></div>
    <h1 id="title">IGCSE SYSTEM 2025</h1>
    <button class="mode-toggle" onclick="toggleTheme()" id="themeBtn">🌙 DARK</button>
</header>

<div class="container" id="homeView">
    <div class="search-area"><input type="text" id="mainSearch" placeholder="SEARCH (CODE OR NAME)" onkeyup="filterGrid()"></div>
    <div id="dashboard"></div>
</div>

<div class="container" id="trackerView">
    <div class="tab-bar" id="trackerTabs"></div>
    <div class="card"><table><thead><tr id="hRow"></tr></thead><tbody id="tBody"></tbody></table></div>
</div>

<button class="nav-btn" id="startBtn" onclick="launchTracker()" style="display:none;">START TRACKING (0)</button>
<button class="back-btn" id="backBtn" onclick="location.reload()" style="display:none;">← DASHBOARD</button>

<div id="overlay" onclick="closeDrawer()"></div>
<div id="drawer">
    <h2 id="dHead" style="font-weight:800;">MISTAKE LOG</h2>
    <textarea id="nArea" placeholder="Enter notes..."></textarea>
    <div style="margin-top:20px;">
        <input type="file" id="fIn" accept="image/*,application/pdf" style="margin-bottom:10px;">
        <div id="fPrev" style="width:100%; border-radius:10px; overflow:hidden;"></div>
    </div>
    <button class="save-btn" onclick="saveData()">SAVE_DATA</button>
</div>

<footer>MADE BY ROLLEDJAM &copy; 2025</footer>

<script>
    const subjects = [
        { n: "Mathematics", c: "0580", p: [2, 4], m: (y) => y >= 2025 ? {2:100, 4:100} : {2:70, 4:130}, color: "var(--math)" },
        { n: "Physics", c: "0625", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}), color: "var(--phys)" },
        { n: "Chemistry", c: "0620", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}), color: "var(--chem)" },
        { n: "Biology", c: "0610", p: [2, 4, 6], m: (y) => ({2:40, 4:80, 6:40}), color: "var(--bio)" },
        { n: "Additional Mathematics", c: "0606", p: [1, 2], m: (y) => ({1:80, 2:80}), color: "var(--math)" },
        { n: "Computer Science", c: "0478", p: [1, 2], m: (y) => ({1:75, 2:75}), color: "var(--phys)" },
        { n: "Environmental Management", c: "0680", p: [1, 2], m: (y) => ({1:80, 2:80}), color: "var(--chem)" },
        { n: "Coordinated Sciences", c: "0654", p: [2, 4, 6], m: (y) => ({2:40, 4:120, 6:60}), color: "var(--bio)" },
        { n: "Business Studies", c: "0450", p: [1, 2], m: (y) => y >= 2020 ? {1:80, 2:80} : {1:100, 2:100}, color: "var(--math)" },
        { n: "Economics", c: "0455", p: [1, 2], m: (y) => ({1:30, 2:90}), color: "var(--phys)" }
    ];

    let selectedIdx = [], activeIdx = -1, activePaperID = '', curFile = '';

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.classList.contains('dark-mode')) {
            body.classList.remove('dark-mode');
            btn.innerText = "🌙 DARK";
        } else {
            body.classList.add('dark-mode');
            btn.innerText = "☀️ LIGHT";
        }
    }

    function init() {
        const grid = document.getElementById('dashboard');
        grid.innerHTML = '';
        subjects.forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'sub-card';
            card.innerHTML = `<p style="font-weight:800; opacity:0.5;">${s.c}</p><h3>${s.n}</h3>`;
            card.onclick = () => {
                if(selectedIdx.includes(i)) {
                    selectedIdx = selectedIdx.filter(x => x !== i);
                    card.classList.remove('selected');
                } else {
                    selectedIdx.push(i);
                    card.classList.add('selected');
                }
                const btn = document.getElementById('startBtn');
                btn.style.display = selectedIdx.length > 0 ? 'block' : 'none';
                btn.innerText = `START TRACKING (${selectedIdx.length})`;
            };
            grid.appendChild(card);
        });
    }

    function filterGrid() {
        const val = document.getElementById('mainSearch').value.toUpperCase();
        document.querySelectorAll('.sub-card').forEach(c => c.style.display = c.innerText.toUpperCase().includes(val) ? 'block' : 'none');
    }

    function launchTracker() {
        document.getElementById('homeView').style.display = 'none';
        document.getElementById('trackerView').style.display = 'block';
        document.getElementById('backBtn').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        const bar = document.getElementById('trackerTabs');
        bar.innerHTML = '';
        selectedIdx.forEach(idx => {
            const t = document.createElement('div');
            t.className = 'tab-item';
            t.innerText = subjects[idx].n;
            t.onclick = () => { activeIdx = idx; document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active')); t.classList.add('active'); renderTable(); };
            bar.appendChild(t);
        });
        bar.firstChild.click();
    }

    function renderTable() {
        const s = subjects[activeIdx];
        document.documentElement.style.setProperty('--current', s.color);
        document.getElementById('hRow').innerHTML = `<th>Year</th><th>Series</th><th>Var</th>` + s.p.map(p => `<th>P${p}</th>`).join('');
        const tbody = document.getElementById('tBody'); tbody.innerHTML = '';
        for (let y = 2025; y >= 2010; y--) {
            const marks = s.m(y);
            ['Feb/Mar', 'May/Jun', 'Oct/Nov'].forEach(sess => {
               [1, 2, 3].forEach(v => {
                    const rowID = `RJ-${s.c}-${y}-${sess}-${v}`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td style="font-weight:800;">${y}</td><td style="color:#aaa;font-size:11px">${sess}</td><td style="color:#ccc">V${v}</td>`;
                    s.p.forEach(p => {
                        const id = rowID + '-p' + p;
                        const score = localStorage.getItem(id + '-m') || '';
                        tr.innerHTML += `<td>
                            <input type="checkbox" ${localStorage.getItem(id)?'checked':''} onchange="localStorage.setItem('${id}', this.checked)">
                            <input type="number" class="mark-box" value="${score}" oninput="valInput(this, ${marks[p]}, '${id}')">
                            <span style="font-size:11px;color:#bbb"> / ${marks[p]}</span>
                            <button style="border:none;background:none;cursor:pointer;font-size:16px;" onclick="openDrawer('${id}','${y} ${sess} V${v} P${p}')">📝</button>
                        </td>`;
                    });
                    tbody.appendChild(tr);
                });
            });
        }
    }

    function valInput(input, max, id) {
        input.value = input.value.replace(/[^0-9]/g, '');
        if (parseInt(input.value) > max) input.value = max;
        localStorage.setItem(id + '-m', input.value);
    }

    function openDrawer(id, label) {
        activePaperID = id;
        document.getElementById('dHead').innerText = label;
        document.getElementById('nArea').value = localStorage.getItem(id + '-n') || '';
        document.getElementById('drawer').classList.add('open');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
    function saveData() { localStorage.setItem(activePaperID + '-n', document.getElementById('nArea').value); closeDrawer(); }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
